name: Merge buckets

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  excavate:
    name: Excavate
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Excavate
        uses: ScoopInstaller/GithubActions@e174c3bef2aeec16a40f2f075cafa167733f0a3e # main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  download:
    name: Download buckets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Restore buckets index
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: index_buckets.json
          key: index
          restore-keys: index

      - name: Download buckets
        run: uv run --no-dev -m download

      - name: Delete old buckets
        run: gh cache delete buckets || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save buckets
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          key: buckets
          path: buckets/

      - name: Sleep
        run: sleep 10

  merge:
    name: Merge buckets for ${{ matrix.branch_name }} branch
    runs-on: ubuntu-latest
    needs:
      - excavate
      - download
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - only_sync: 1
            branch_name: bucket
          - only_sync: 0
            branch_name: proxy_bucket
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Setup UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Restore buckets index
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: index_buckets.json
          key: index
          restore-keys: index

      - name: Restore buckets
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: buckets
          path: buckets/
          fail-on-cache-miss: true

      - name: Copy ./bucket to buckets
        run: |
          mkdir -p buckets/arama0517_scoop-bucket-x-generator
          cp -r ./bucket ./buckets/arama0517_scoop-bucket-x-generator/

      - name: Merge buckets
        run: uv run --no-dev -m merge
        env:
          ONLY_SYNC: ${{ matrix.only_sync }}

      - name: Init ${{ matrix.branch_name }} branch and get commit message
        id: init
        run: |
          echo "commit_message=feat(bucket): auto update at $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

          mkdir -p results/bin
          wget -O results/bin/php-postinstall.ps1 https://raw.githubusercontent.com/ScoopInstaller/PHP/refs/heads/master/bin/postinstall.ps1
          cp ./README.md ./results/README.md
          cp ./LICENSE ./results/LICENSE

      - name: Deploy to ${{ matrix.branch_name }} branch
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: Arama0517/scoop-bucket-x
          publish_branch: ${{ matrix.branch_name }}
          publish_dir: ./results
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          full_commit_message: ${{ steps.init.outputs.commit_message }}
          enable_jekyll: true
          force_orphan: true
